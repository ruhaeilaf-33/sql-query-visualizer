<!DOCTYPE html>
<html>
<head>
    <title>SQL Query Visualizer</title>

    <link rel="stylesheet" href="style.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <div class="container">
        <h1>💻 SQL Query Visualizer</h1>

        <textarea id="query" placeholder="Enter your SQL query...">
SELECT * FROM student;
        </textarea>

        <br>

        <button onclick="runQuery()">Run Query</button>
        <button onclick="downloadCSV()">Download CSV</button>
        <button onclick="generateSQL()">Generate SQL</button>

        <h2>📊 Result Table</h2>
        <div id="result"></div>

        <h2>📈 Visualization</h2>
        <canvas id="chart"></canvas>

        <h2>🕘 Query History</h2>
        <ul id="history"></ul>
    </div>

    <script src="script.js"></script>

</body>
</html>
